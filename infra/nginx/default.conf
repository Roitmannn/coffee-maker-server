server {
    listen 80;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # Mount certs into /etc/nginx/ssl via docker-compose:
    # - infra/nginx/ssl/cert.pem
    # - infra/nginx/ssl/key.pem
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the static admin UI (SPA-friendly routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to the Node backend
    location /api/ {
        # Keep the full original URI, including the /api prefix.
        # (A trailing slash in proxy_pass here would strip /api and break routes.)
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}