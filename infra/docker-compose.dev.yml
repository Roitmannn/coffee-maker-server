services:
  backend:
    image: node:18-alpine
    container_name: coffee_backend_dev
    working_dir: /app
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      - NODE_ENV=development
      - PORT=3000
    ports:
      - "3000:3000"
    volumes:
      - ../backend:/app
    command: sh -c "npm install && npm run dev"
    networks:
      - coffee_net

  nginx:
    image: nginx:alpine
    container_name: coffee_nginx_dev
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend:/usr/share/nginx/html:ro
    networks:
      - coffee_net

networks:
  coffee_net:
    driver: bridge

